<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ortus · HubSpot Sync</title>
<style>
  :root {
    color-scheme: light;
    --ink:        #16140F;
    --ink-2:      #2C2A24;
    --ink-soft:   #6B6557;
    --ink-faint:  #A39B89;
    --paper:      #FDFBF7;
    --paper-2:    #F6F2E9;
    --paper-warm: #F1ECDF;
    --rule:       #E5DFD0;
    --rule-2:     #C9C0AC;
    --gold:       #C99046;
    --gold-deep:  #9B6A26;
    --gold-warm:  #F0CE89;
    --gold-tint:  #F6E8C8;
    --ok:         #4F7A4D;
    --err:        #8B3A2E;
    --serif:      "Newsreader", "Charter", "Iowan Old Style", Georgia, serif;
    --sans:       "Geist", "InterDisplay", system-ui, sans-serif;
    --mono:       "Geist Mono", "JetBrains Mono", "SFMono-Regular", monospace;
    --ease:       cubic-bezier(0.32, 0.72, 0, 1);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    width: 390px;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--ink-2);
    background: linear-gradient(180deg, #ECE5D2 0%, #DCD3BC 100%);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Popup chrome (1:1 with QuickConnect) ── */
  .popup-shell {
    width: 390px;
    background: linear-gradient(180deg, #ECE5D2 0%, #DCD3BC 100%);
    padding: 8px;
    border-radius: 22px;
    color: var(--ink-2);
    font-size: 13px;
  }
  .popup {
    background: var(--paper);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.9) inset,
      0 0 0 1px rgba(60,40,10,0.04);
  }
  .popup::before {
    content: ""; position: absolute; inset: 0;
    pointer-events: none; opacity: 0.5; mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.32  0 0 0 0 0.27  0 0 0 0 0.18  0 0 0 0.07 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
  }

  /* Masthead */
  .masthead {
    padding: 18px 20px 16px;
    display: grid; grid-template-columns: 1fr auto;
    align-items: center; gap: 12px;
    border-bottom: 1px solid var(--rule);
    background: linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
    position: relative;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .ortus-mark {
    display: inline-block; width: 28px; height: 28px;
    border-radius: 6px; flex-shrink: 0;
  }
  .brand-name { font-family: var(--serif); font-weight: 500; font-size: 14px; color: var(--ink); }
  .brand-sub {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-faint); margin-top: 1px;
    display: flex; align-items: center; gap: 6px;
  }
  .live-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 7px 2px 5px;
    border-radius: 999px;
    background: var(--gold-tint);
    border: 1px solid var(--gold-deep);
    color: #6F4715;
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.12em; text-transform: uppercase;
    font-weight: 600;
  }
  .live-badge[data-state="standby"] { background: transparent; border-color: var(--rule-2); color: var(--ink-soft); }
  .live-badge[data-state="error"]   { background: rgba(139,58,46,0.08); border-color: var(--err); color: var(--err); }
  .live-badge .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold-deep); }
  .live-badge[data-state="standby"] .dot { background: var(--ink-faint); }
  .live-badge[data-state="error"] .dot   { background: var(--err); }

  /* Dossier */
  .dossier { padding: 22px 22px 22px; border-bottom: 1px solid var(--rule); }
  .dossier .eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 9.5px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--gold-deep); margin-bottom: 12px;
  }
  .dossier .eyebrow::before { content: ""; width: 16px; height: 1px; background: var(--gold-deep); }
  .dossier .eyebrow.muted { color: var(--ink-faint); }
  .dossier .eyebrow.muted::before { background: var(--ink-faint); }
  .dossier .eyebrow.error { color: var(--err); }
  .dossier .eyebrow.error::before { background: var(--err); }
  .dossier .eyebrow.ok { color: var(--ok); }
  .dossier .eyebrow.ok::before { background: var(--ok); }
  .dossier-name {
    font-family: var(--serif); font-weight: 500;
    font-size: 26px; line-height: 1.05;
    letter-spacing: -0.018em; color: var(--ink);
    text-wrap: balance;
  }
  .dossier-name em { font-style: italic; font-weight: 400; }
  .dossier.standby .dossier-name { font-size: 22px; line-height: 1.15; }
  .dossier-role {
    margin-top: 4px;
    font-size: 12px; line-height: 1.5;
    color: var(--ink-soft);
  }
  .dossier-role .sep { color: var(--ink-faint); margin: 0 6px; }
  .meta-line {
    margin-top: 10px;
    font-family: var(--mono); font-size: 10px;
    color: var(--ink-faint); letter-spacing: 0.06em;
    word-break: break-all;
  }
  .meta-line b { color: var(--ink-soft); font-weight: 600; }
  .since-line {
    margin-top: 10px;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 10px;
    color: var(--ink-soft); letter-spacing: 0.06em; text-transform: uppercase;
  }
  .since-line a {
    color: var(--gold-deep);
    border-bottom: 1px solid rgba(155,106,38,0.3);
    text-decoration: none; padding-bottom: 1px;
  }
  .warning-chip {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(201,144,70,0.1);
    border: 1px solid var(--gold);
    color: #6F4715;
    font-family: var(--mono); font-size: 9.5px;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .warning-chip .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); }

  /* CTAs */
  .actions { display: flex; align-items: center; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .cta {
    display: inline-flex; align-items: center; gap: 8px;
    height: 40px; padding: 4px 4px 4px 18px;
    border-radius: 999px;
    background: var(--ink); color: var(--paper); border: 0;
    font: 500 13px/1 var(--sans); cursor: pointer;
    box-shadow: 0 1px 0 rgba(255,255,255,0.07) inset, 0 12px 28px -10px rgba(20,15,5,0.55);
  }
  .cta .label-sub { color: rgba(255,255,255,0.5); margin-left: 4px; font-size: 11px; font-family: var(--mono); letter-spacing: 0.06em; }
  .cta .icon-pod {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--gold); color: var(--ink);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cta.success { background: var(--ok); }
  .cta.success .icon-pod { background: rgba(255,255,255,0.85); color: var(--ok); }
  .cta:disabled { opacity: 0.45; cursor: not-allowed; }
  .ghost {
    height: 40px; padding: 0 16px;
    border-radius: 999px;
    background: transparent; color: var(--ink-2);
    border: 1px solid var(--rule-2);
    font: 500 12px/1 var(--sans); cursor: pointer;
  }
  .ghost.danger { color: var(--err); border-color: rgba(139,58,46,0.4); }

  /* Spinner shimmer */
  .shimmer-headline {
    height: 26px; width: 70%;
    background: linear-gradient(90deg, var(--paper-2) 0%, var(--rule) 50%, var(--paper-2) 100%);
    background-size: 200% 100%;
    border-radius: 4px;
    animation: shimmer 1.6s var(--ease) infinite;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Tabs (Settings) */
  .tabs {
    display: flex; gap: 0; padding: 0 20px;
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
  }
  .tab {
    background: transparent; border: 0; cursor: pointer;
    padding: 12px 0; margin-right: 18px;
    font-family: var(--mono); font-size: 9.5px;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-faint);
    border-bottom: 1.5px solid transparent;
    margin-bottom: -1px;
  }
  .tab[aria-selected="true"] { color: var(--ink); border-bottom-color: var(--gold); }

  .tab-body { padding: 18px 20px 18px; background: var(--paper); }
  .tab-body .eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 9.5px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--gold-deep); margin-bottom: 10px;
  }
  .tab-body .eyebrow::before { content: ""; width: 16px; height: 1px; background: var(--gold-deep); }
  .tab-body h3 {
    margin: 0 0 6px;
    font-family: var(--serif); font-weight: 500;
    font-size: 17px; letter-spacing: -0.012em; color: var(--ink);
  }
  .tab-body .desc { margin: 0 0 10px; color: var(--ink-soft); font-size: 12px; line-height: 1.5; }

  .check-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0;
    border-top: 1px solid var(--rule);
    font-size: 12px; color: var(--ink-2);
  }
  .check-row:first-of-type { border-top: 0; }
  .check-row .check-label { display: flex; align-items: center; gap: 10px; }
  .check-row .check-icon {
    width: 18px; height: 18px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px; font-weight: 600;
  }
  .check-row .check-icon.ok  { background: rgba(79,122,77,0.12); color: var(--ok); }
  .check-row .check-icon.err { background: rgba(139,58,46,0.12); color: var(--err); }
  .check-row .check-status {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-faint);
  }
  .check-row .check-status.ok  { color: var(--ok); }
  .check-row .check-status.err { color: var(--err); }
  .button-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .btn { height: 32px; padding: 0 14px; border-radius: 999px; border: 0; font: 500 12px/1 var(--sans); cursor: pointer; }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-ghost { background: transparent; color: var(--ink-2); border: 1px solid var(--rule-2); }

  /* Footer */
  .footer {
    padding: 10px 20px 14px;
    background: var(--paper-warm);
    border-top: 1px solid var(--rule);
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* Per-state */
  .err-line {
    margin-top: 8px;
    font-family: var(--mono); font-size: 10.5px;
    color: var(--err);
    background: rgba(139,58,46,0.06);
    border-left: 2px solid var(--err);
    padding: 8px 10px; border-radius: 4px;
    line-height: 1.5;
  }

  /* Icon helpers */
  .ic { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

  /* Focus */
  :focus-visible {
    outline: 2px solid var(--gold-deep);
    outline-offset: 2px;
  }
</style>
</head>
<body>
  <main class="popup-shell"><div class="popup">

    <header class="masthead">
      <div class="brand">
        <svg class="ortus-mark" viewBox="0 0 128 128" aria-hidden="true">
          <rect x="0" y="0" width="128" height="128" rx="22" fill="#16140F"/>
          <g stroke="#FDFBF7" stroke-width="4" fill="none" stroke-linejoin="miter" stroke-linecap="square">
            <path d="M64,42 L46,76 L82,76 Z"/>
            <line x1="64" y1="42" x2="64" y2="76"/>
            <line x1="55" y1="59" x2="73" y2="59"/>
            <path d="M30,76 L98,76 L84,94 L44,94 Z"/>
          </g>
        </svg>
        <div>
          <div class="brand-name">Ortus · HubSpot Sync</div>
          <div class="brand-sub">
            <span id="liveBadge" class="live-badge" data-state="standby" role="status" aria-live="polite">
              <span class="dot"></span><span id="liveBadgeText">Standby</span>
            </span>
          </div>
        </div>
      </div>
    </header>

    <section id="dossier" class="dossier standby">
      <div class="eyebrow muted" id="eyebrow">Open a profile</div>
      <h1 class="dossier-name" id="headline">Open a LinkedIn profile to begin.</h1>
      <p class="dossier-role" id="role" hidden></p>
      <div class="meta-line" id="metaLine" hidden></div>
      <div class="since-line" id="sinceLine" hidden></div>
      <span class="warning-chip" id="warningChip" hidden><span class="dot"></span><span id="warningText"></span></span>
      <div class="err-line" id="errLine" hidden></div>
      <div class="actions" id="actions" hidden></div>
    </section>

    <nav class="tabs" role="tablist">
      <button class="tab" role="tab" id="tab-profile" aria-selected="true">Profile</button>
      <button class="tab" role="tab" id="tab-settings" aria-selected="false">Settings</button>
    </nav>

    <section class="tab-body" id="panel-settings" hidden>
      <span class="eyebrow">Connection</span>
      <h3>HubSpot connection</h3>
      <p class="desc">Token is bundled in this build. No setup needed per operator.</p>
      <div class="check-row">
        <div class="check-label"><span class="check-icon" id="tokenIcon">…</span><span>API token valid</span></div>
        <span class="check-status" id="tokenStatus">Checking</span>
      </div>
      <div class="check-row">
        <div class="check-label"><span class="check-icon" id="propIcon">…</span><span>Custom property <code>linkedin_membership_id</code></span></div>
        <span class="check-status" id="propStatus">Checking</span>
      </div>
      <div class="button-row">
        <button id="testConnectionBtn" class="btn btn-primary" type="button">Test connection</button>
        <button id="resetCacheBtn" class="btn btn-ghost" type="button">Reset cache</button>
      </div>
    </section>

    <footer class="footer">
      <span>Ortus Club · 2026</span>
      <span>v0.1</span>
    </footer>

  </div></main>
  <script src="popup.js"></script>
</body>
</html>
